name: Daily AI Social Hot update

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Add today's social records (seedCaptures)
        run: node scripts/daily-update.mjs || true
        continue-on-error: true

      - name: Run curriculum updater (OFFICIAL_DOCS + external topics)
        run: node scripts/curriculum-update.cjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/index.html site/social-content-tracker/topics.json curriculum.json
          git diff --cached --quiet || git commit -m "auto: $(date +%Y-%m-%d) 每日更新 - 课程表+seedCaptures"
          git push
