    function getVisibleAccounts() {
      if (platformFilter.value === "all") return curatedAccounts;
      return curatedAccounts.filter(account => account.platform === platformFilter.value);
    }

    function render() {
      const visibleAccounts = getVisibleAccounts();
      count.textContent = `${visibleAccounts.length} 个账号`;
      list.innerHTML = visibleAccounts.map(account => `
        <article class="item">
          <div class="item-head">
            <h2><a href="${account.url}" target="_blank" rel="noopener noreferrer">${account.title}</a></h2>

          </div>
          <div class="meta">
            <span>${account.platform}</span>
            <span>${account.url}</span>
          </div>
          <div class="tags">
            ${account.tags.map(tag => `<span class="tag">#${tag}</span>`).join("")}
          </div>
          <p class="note">${account.note}</p>
        </article>
      `).join("");
    }

    function toImportEntries(items) {
      return items.map((account, index) => ({
        id: `collected-${account.platform.toLowerCase()}-${account.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "")}-${index + 1}`,
        type: "account",
        platform: account.platform,
        score: account.score,
        title: account.title,
        url: account.url,
        tags: account.tags,
        note: account.note,
        createdAt: new Date().toISOString()
      }));
    }

    platformFilter.addEventListener("change", render);
    document.querySelector("#exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(toImportEntries(getVisibleAccounts()), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `collected-accounts-${platformFilter.value.toLowerCase()}-${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      URL.revokeObjectURL(url);
    });

    render();
  </script>
</body>
</html>
